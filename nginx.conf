worker_processes auto;
worker_rlimit_nofile 65535;
worker_priority -10;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nodelay on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;

    keepalive_timeout 86400;
    keepalive_requests 1000000;
    keepalive_disable none;

    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    output_buffers 1 128k;
    postpone_output 0;

    send_timeout 86400;
    client_body_timeout 86400;
    client_header_timeout 10s;

    gzip on;
    gzip_vary on;
    gzip_comp_level 3;
    gzip_types text/plain application/json;

    server {
        listen 8080 deferred reuseport;
        server_name _;

        location = / {
            return 200 "✅ Service OK | GCP Ready";
            add_header Content-Type text/plain always;
            add_header Access-Control-Allow-Origin * always;
        }

        set $proxy_timeout 86400s;
        set $proxy_conn_timeout 5s;

        # 🟢 Trojan — Port 10001
        location ^~ /WebmasterGhie {
            proxy_pass http://127.0.0.1:10001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_connect_timeout $proxy_conn_timeout;
            proxy_send_timeout $proxy_timeout;
            proxy_read_timeout $proxy_timeout;
        }

        # 🟢 VLESS — Port 10002
        location ^~ /WebmasterGhie {
            proxy_pass http://127.0.0.1:10002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_connect_timeout $proxy_conn_timeout;
            proxy_send_timeout $proxy_timeout;
            proxy_read_timeout $proxy_timeout;
        }

        # 🟢 VMess — Port 10003
        location ^~ /WebmasterGhie {
            proxy_pass http://127.0.0.1:10003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_connect_timeout $proxy_conn_timeout;
            proxy_send_timeout $proxy_timeout;
            proxy_read_timeout $proxy_timeout;
        }

        # 🟢 Shadowsocks — Port 10004
        location ^~ /WebmasterGhie {
            proxy_pass http://127.0.0.1:10004;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_connect_timeout $proxy_conn_timeout;
            proxy_send_timeout $proxy_timeout;
            proxy_read_timeout $proxy_timeout;
        }
    }
}
